services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      LOCALSCRIPT_MODEL: ${LOCALSCRIPT_MODEL:-qwen2.5-coder:7b}
    entrypoint: ["/bin/sh", "-c", "ollama pull \"$${LOCALSCRIPT_MODEL}\""]
    restart: "no"

  app:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      OLLAMA_HOST: http://ollama:11434
      LOCALSCRIPT_MODEL: ${LOCALSCRIPT_MODEL:-qwen2.5-coder:7b}
      LUAC_BIN: /usr/bin/luac5.4
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

volumes:
  ollama_data:
